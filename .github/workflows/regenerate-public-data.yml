name: Regenerate public data

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/regenerate-public-data.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Restore IMLJD Supreme Court judgment import
        shell: bash
        run: |
          node <<'NODE'
          (async () => {
            const fs = require('fs');
            const path = require('path');
            const https = require('https');
            const sourceJsonUrl = 'https://justice-clock-india.vercel.app/data/judgments.json';
            const outPath = path.join('data', 'imports', 'judgments.csv');
            const headers = ['id','caseTitle','caseNumber','diaryNumber','diaryYear','caseType','caseYear','decisionDate','judgmentDate','uploadDate','disposalNature','judges','authoringJudge','benchSize','subjectTags','sourceName','sourceUrl','confidence','sample'];
            function download(url) {
              return new Promise((resolve, reject) => {
                const request = https.get(url, { headers: { 'User-Agent': 'justice-clock-india-data-import' } }, (response) => {
                  if ((response.statusCode || 0) >= 400) {
                    response.resume();
                    reject(new Error(`Download failed ${response.statusCode} for ${url}`));
                    return;
                  }
                  const chunks = [];
                  response.on('data', (chunk) => chunks.push(chunk));
                  response.on('end', () => resolve(Buffer.concat(chunks).toString('utf8')));
                });
                request.on('error', reject);
                request.setTimeout(120000, () => request.destroy(new Error(`Timed out downloading ${url}`)));
              });
            }
            function csvEscape(value) {
              const text = value == null ? '' : String(value);
              return /[",\r\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
            }
            const records = JSON.parse(await download(sourceJsonUrl));
            if (!Array.isArray(records)) throw new Error('Expected judgments JSON array');
            const normalized = records.filter((record) => record && record.sourceName === 'IMLJD open dataset' && record.sample === false);
            if (normalized.length < 1000) throw new Error(`Expected at least 1000 imported IMLJD records, got ${normalized.length}`);
            fs.mkdirSync(path.dirname(outPath), { recursive: true });
            const csv = [headers.join(','), ...normalized.map((record) => headers.map((header) => csvEscape(record[header])).join(','))].join('\n') + '\n';
            fs.writeFileSync(outPath, csv);
            console.log(`Wrote ${normalized.length} IMLJD Supreme Court records to ${outPath}`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Generate public data and build
        run: |
          npm run data:build
          npm run build

      - name: Commit regenerated public data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json data/imports/judgments.csv public/data/court-clock.json public/data/case-types.json public/data/judges.json public/data/judgments.json public/data/justice-clock-data.json
          if git diff --cached --quiet; then
            echo "No public data changes to commit."
          else
            git commit -m "Regenerate public data from imported sources"
            git push
          fi
